version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cowork_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cowork123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:cowork123@db:5432/cowork_db
      NODE_ENV: production
      PORT: 3001
      # Copiar el resto de env vars del archivo .env de producción:
      # JWT_SECRET: <cambiar_en_produccion>
      # CLIENT_URL: https://tudominio.com
    env_file:
      - ./server/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
