name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Type-check + Build del cliente ────────────────────────────────────────
  client:
    name: Client — type-check & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ""

  # ── Type-check + Build del servidor ──────────────────────────────────────
  server:
    name: Server — type-check & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Tests del servidor ────────────────────────────────────────────────────
  server-tests:
    name: Server — tests
    runs-on: ubuntu-latest
    needs: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cowork_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/cowork_test
      JWT_SECRET: test-secret-key-minimum-32-characters-long
      JWT_EXPIRES_IN: 1d
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test -- --forceExit

  # ── Tests del cliente ────────────────────────────────────────────────────
  client-tests:
    name: Client — tests
    runs-on: ubuntu-latest
    needs: client

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker — build check
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cowork-app:ci .
